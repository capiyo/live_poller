services:
  - type: worker                    # ← MUST be worker, NOT web
    name: fanclash-live-poller
    runtime: python
    region: frankfurt
    plan: starter                   # free tier spins down — starter stays alive
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python live_poller.py
    envVars:
      - key: DATABASE_URL
        sync: false                 # set in Render dashboard, keep out of git
      - key: FANCLASH_API
        value: https://fanclash-api.onrender.com/api
      - key: PYTHONUNBUFFERED
        value: "1"                  # logs appear instantly