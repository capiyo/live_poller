services:
  - type: web                       # ← web (free tier) not worker
    name: fanclash-live-poller
    runtime: python
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python live_poller.py
    envVars:
      - key: DATABASE_URL
        sync: false                 # set in Render dashboard
      - key: FANCLASH_API
        value: https://fanclash-api.onrender.com/api
      - key: PYTHONUNBUFFERED
        value: "1"